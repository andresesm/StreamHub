<script>
  (function () {
    const linkshubView = document.getElementById('linkshubView');
    const fullProfileView = document.getElementById('fullProfileView');
    const bgLayer = document.getElementById('linkshubBgLayer');
    const root = document.documentElement;

    let fullScriptsLoaded = false;
    let fullScriptsPromise = null;
    let themeMemory = null;

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        if (document.querySelector(`script[data-dynamic-src="${src}"]`)) {
          resolve();
          return;
        }

        const script = document.createElement('script');
        script.src = src;
        script.defer = true;
        script.dataset.dynamicSrc = src;
        script.onload = () => resolve();
        script.onerror = () => reject(new Error(`No se pudo cargar ${src}`));
        document.body.appendChild(script);
      });
    }

    function loadFullProfileScripts() {
      if (fullScriptsLoaded) return Promise.resolve();
      if (fullScriptsPromise) return fullScriptsPromise;

      fullScriptsPromise = Promise.all([
        loadScript('../../js/game-cover-local.js'),
        loadScript('../../js/twitch-integration.js'),
        loadScript('../../js/streamhub-profile.js')
      ]).then(() => {
        fullScriptsLoaded = true;
      }).catch((error) => {
        fullScriptsPromise = null;
        throw error;
      });

      return fullScriptsPromise;
    }

    function showLinkshub() {
      if (linkshubView) linkshubView.hidden = false;
      if (fullProfileView) fullProfileView.hidden = true;
      document.body.classList.add('linkshub-body');
      if (bgLayer) bgLayer.hidden = false;
    }

    function showFullProfile() {
      if (linkshubView) linkshubView.hidden = true;
      if (fullProfileView) fullProfileView.hidden = false;
      document.body.classList.remove('linkshub-body');
      if (bgLayer) bgLayer.hidden = true;

      loadFullProfileScripts().catch((error) => {
        console.error('No se pudieron cargar los scripts del perfil completo.', error);
      });
    }

    function syncViewFromHash() {
      if (window.location.hash === '#full') {
        showFullProfile();
      } else {
        showLinkshub();
      }
    }

    function getStoredTheme() {
      try {
        return themeMemory || null;
      } catch (_) {
        return null;
      }
    }

    function setStoredTheme(value) {
      try {
        themeMemory = value;
      } catch (_) {}
    }

    function applyInitialTheme() {
      const savedTheme = getStoredTheme();
      if (savedTheme === 'day' || savedTheme === 'night') {
        root.setAttribute('data-theme', savedTheme);
      } else if (!root.getAttribute('data-theme')) {
        root.setAttribute('data-theme', 'night');
      }
    }

    document.addEventListener('click', function (event) {
      const trigger = event.target.closest('a[href="#full"]');
      if (trigger) {
        event.preventDefault();
        if (window.location.hash !== '#full') {
          window.location.hash = 'full';
        } else {
          syncViewFromHash();
        }
        return;
      }

      const toggle = event.target.closest('#themeToggle');
      if (toggle) {
        const current = root.getAttribute('data-theme') === 'night' ? 'night' : 'day';
        const next = current === 'night' ? 'day' : 'night';
        root.setAttribute('data-theme', next);
        setStoredTheme(next);
      }
    });

    window.addEventListener('hashchange', syncViewFromHash);

    applyInitialTheme();

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', syncViewFromHash, { once: true });
    } else {
      syncViewFromHash();
    }
  })();
</script>
