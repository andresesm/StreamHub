name: TEST

on:
  workflow_dispatch:
    inputs:
      start_id:
        description: "ID inicial"
        required: true
        default: "1"
      end_id:
        description: "ID final"
        required: true
        default: "50"

jobs:
  generate-profiles-by-range:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verificar archivos base
        run: |
          test -f "u/profile-template.html"
          test -f "data/creators.json"

      - name: Generar perfiles por rango y crear log
        shell: bash
        run: |
          START_ID="${{ github.event.inputs.start_id }}"
          END_ID="${{ github.event.inputs.end_id }}"
          LOG_FILE="profile-generation-log.csv"

          if ! [[ "$START_ID" =~ ^[0-9]+$ ]]; then
            echo "start_id inválido: $START_ID"
            exit 1
          fi

          if ! [[ "$END_ID" =~ ^[0-9]+$ ]]; then
            echo "end_id inválido: $END_ID"
            exit 1
          fi

          if [ "$START_ID" -gt "$END_ID" ]; then
            echo "El start_id no puede ser mayor al end_id"
            exit 1
          fi

          echo "username,status,warning" > "$LOG_FILE"

          jq -c --argjson start "$START_ID" --argjson end "$END_ID" '
            map(select(
              (.id != null) and
              ((.id | tonumber) >= $start) and
              ((.id | tonumber) <= $end)
            ))[]
          ' data/creators.json | while read -r creator; do
            ID=$(echo "$creator" | jq -r '.id // empty')
            USERNAME=$(echo "$creator" | jq -r '.username // empty')
            DISPLAYNAME=$(echo "$creator" | jq -r '.username // empty')

            if [ -z "$ID" ]; then
              echo "\"\",\"skipped\",\"missing id\"" >> "$LOG_FILE"
              continue
            fi

            if [ -z "$USERNAME" ]; then
              echo "\"\",\"skipped\",\"missing username for id $ID\"" >> "$LOG_FILE"
              continue
            fi

            TARGET_DIR="u/$USERNAME"
            TARGET_FILE="$TARGET_DIR/index.html"

            mkdir -p "$TARGET_DIR"

            if ! cp "u/profile-template.html" "$TARGET_FILE"; then
              echo "\"$USERNAME\",\"error\",\"could not copy template\"" >> "$LOG_FILE"
              continue
            fi

            if ! sed -i "s|PH-STREAMER-USERNAME|$USERNAME|g" "$TARGET_FILE"; then
              echo "\"$USERNAME\",\"error\",\"failed replacing PH-STREAMER-USERNAME\"" >> "$LOG_FILE"
              continue
            fi

            if ! sed -i "s|PH-STREAMER-DISPLAYNAME|$DISPLAYNAME|g" "$TARGET_FILE"; then
              echo "\"$USERNAME\",\"error\",\"failed replacing PH-STREAMER-DISPLAYNAME\"" >> "$LOG_FILE"
              continue
            fi

            AVATAR=$(echo "$creator" | jq -r '.avatar // .profilePhoto // .photo // empty')
            BIO_SHORT=$(echo "$creator" | jq -r '.bioShort // .shortBio // .bio // empty')
            CATEGORY=$(echo "$creator" | jq -r '.category // .mainCategory // .game // empty')

            TWITCH=$(echo "$creator" | jq -r '.socials.twitch // empty')
            KICK=$(echo "$creator" | jq -r '.socials.kick // empty')
            IG=$(echo "$creator" | jq -r '.socials.ig // empty')
            XLINK=$(echo "$creator" | jq -r '.socials.x // empty')
            YOUTUBE=$(echo "$creator" | jq -r '.socials.youtube // empty')
            TIKTOK=$(echo "$creator" | jq -r '.socials.tiktok // empty')
            EMAIL=$(echo "$creator" | jq -r '.socials.email // empty')

            [ -z "$AVATAR" ] && AVATAR="PH-LINK-PENDING"
            [ -z "$BIO_SHORT" ] && BIO_SHORT="PH-LINK-PENDING"
            [ -z "$CATEGORY" ] && CATEGORY="PH-LINK-PENDING"

            [ -z "$TWITCH" ] && TWITCH="PH-LINK-PENDING"
            [ -z "$KICK" ] && KICK="PH-LINK-PENDING"
            [ -z "$IG" ] && IG="PH-LINK-PENDING"
            [ -z "$XLINK" ] && XLINK="PH-LINK-PENDING"
            [ -z "$YOUTUBE" ] && YOUTUBE="PH-LINK-PENDING"
            [ -z "$TIKTOK" ] && TIKTOK="PH-LINK-PENDING"
            [ -z "$EMAIL" ] && EMAIL="PH-LINK-PENDING"

            safe_sed() {
              local placeholder="$1"
              local value="$2"
              local escaped
              escaped=$(printf '%s' "$value" | sed -e 's/[\/&]/\\&/g')
              sed -i "s|$placeholder|$escaped|g" "$TARGET_FILE"
            }

            if ! safe_sed "PH-STREAMER-AVATAR" "$AVATAR"; then
              echo "\"$USERNAME\",\"error\",\"failed replacing PH-STREAMER-AVATAR\"" >> "$LOG_FILE"
              continue
            fi

            if ! safe_sed "PH-STREAMER-BIO-SHORT" "$BIO_SHORT"; then
              echo "\"$USERNAME\",\"error\",\"failed replacing PH-STREAMER-BIO-SHORT\"" >> "$LOG_FILE"
              continue
            fi

            if ! safe_sed "PH-STREAMER-CATEGORY" "$CATEGORY"; then
              echo "\"$USERNAME\",\"error\",\"failed replacing PH-STREAMER-CATEGORY\"" >> "$LOG_FILE"
              continue
            fi

            if ! safe_sed "PH-LINK-TWITCH" "$TWITCH"; then
              echo "\"$USERNAME\",\"error\",\"failed replacing PH-LINK-TWITCH\"" >> "$LOG_FILE"
              continue
            fi

            if ! safe_sed "PH-LINK-KICK" "$KICK"; then
              echo "\"$USERNAME\",\"error\",\"failed replacing PH-LINK-KICK\"" >> "$LOG_FILE"
              continue
            fi

            if ! safe_sed "PH-LINK-INSTAGRAM" "$IG"; then
              echo "\"$USERNAME\",\"error\",\"failed replacing PH-LINK-INSTAGRAM\"" >> "$LOG_FILE"
              continue
            fi

            if ! safe_sed "PH-LINK-IG" "$IG"; then
              echo "\"$USERNAME\",\"error\",\"failed replacing PH-LINK-IG\"" >> "$LOG_FILE"
              continue
            fi

            if ! safe_sed "PH-LINK-X" "$XLINK"; then
              echo "\"$USERNAME\",\"error\",\"failed replacing PH-LINK-X\"" >> "$LOG_FILE"
              continue
            fi

            if ! safe_sed "PH-LINK-YOUTUBE" "$YOUTUBE"; then
              echo "\"$USERNAME\",\"error\",\"failed replacing PH-LINK-YOUTUBE\"" >> "$LOG_FILE"
              continue
            fi

            if ! safe_sed "PH-LINK-TIKTOK" "$TIKTOK"; then
              echo "\"$USERNAME\",\"error\",\"failed replacing PH-LINK-TIKTOK\"" >> "$LOG_FILE"
              continue
            fi

            if ! safe_sed "PH-LINK-EMAIL" "$EMAIL"; then
              echo "\"$USERNAME\",\"error\",\"failed replacing PH-LINK-EMAIL\"" >> "$LOG_FILE"
              continue
            fi

            if ! safe_sed "PH-STREAMER-TWITCH" "$TWITCH"; then
              echo "\"$USERNAME\",\"error\",\"failed replacing PH-STREAMER-TWITCH\"" >> "$LOG_FILE"
              continue
            fi

            if ! safe_sed "PH-STREAMER-KICK" "$KICK"; then
              echo "\"$USERNAME\",\"error\",\"failed replacing PH-STREAMER-KICK\"" >> "$LOG_FILE"
              continue
            fi

            if ! safe_sed "PH-STREAMER-YOUTUBE" "$YOUTUBE"; then
              echo "\"$USERNAME\",\"error\",\"failed replacing PH-STREAMER-YOUTUBE\"" >> "$LOG_FILE"
              continue
            fi

            if ! safe_sed "PH-STREAMER-TIKTOK" "$TIKTOK"; then
              echo "\"$USERNAME\",\"error\",\"failed replacing PH-STREAMER-TIKTOK\"" >> "$LOG_FILE"
              continue
            fi

            if ! safe_sed "PH-STREAMER-IG" "$IG"; then
              echo "\"$USERNAME\",\"error\",\"failed replacing PH-STREAMER-IG\"" >> "$LOG_FILE"
              continue
            fi

            if ! safe_sed "PH-STREAMER-X" "$XLINK"; then
              echo "\"$USERNAME\",\"error\",\"failed replacing PH-STREAMER-X\"" >> "$LOG_FILE"
              continue
            fi

            if ! safe_sed "PH-STREAMER-EMAIL" "$EMAIL"; then
              echo "\"$USERNAME\",\"error\",\"failed replacing PH-STREAMER-EMAIL\"" >> "$LOG_FILE"
              continue
            fi

            if grep -q "$USERNAME" "$TARGET_FILE"; then
              echo "\"$USERNAME\",\"generated\",\"ok\"" >> "$LOG_FILE"
            else
              echo "\"$USERNAME\",\"warning\",\"file created but username not found in output\"" >> "$LOG_FILE"
            fi
          done

      - name: Mostrar log generado
        run: |
          echo "=== profile-generation-log.csv ==="
          cat profile-generation-log.csv

      - name: Mostrar carpetas generadas
        run: |
          echo "=== Árbol de u/ ==="
          ls -R u || true

      - name: Subir artifact de perfiles
        uses: actions/upload-artifact@v6
        with:
          name: generated-profiles-range-${{ github.event.inputs.start_id }}-${{ github.event.inputs.end_id }}
          path: |
            u/
            profile-generation-log.csv
          if-no-files-found: error
          overwrite: true