name: Generate profiles by ID range

on:
  workflow_dispatch:
    inputs:
      start_id:
        description: "ID inicial"
        required: true
        default: "1"
      end_id:
        description: "ID final"
        required: true
        default: "50"

jobs:
  generate-profiles-by-range:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verificar archivos base
        run: |
          test -f "u/profile-template.html"
          test -f "data/creators.json"

      - name: Generar perfiles por rango y crear log
        shell: bash
        run: |
          START_ID="${{ github.event.inputs.start_id }}"
          END_ID="${{ github.event.inputs.end_id }}"
          LOG_FILE="profile-generation-log.csv"

          if ! [[ "$START_ID" =~ ^[0-9]+$ ]]; then
            echo "start_id inválido: $START_ID"
            exit 1
          fi

          if ! [[ "$END_ID" =~ ^[0-9]+$ ]]; then
            echo "end_id inválido: $END_ID"
            exit 1
          fi

          if [ "$START_ID" -gt "$END_ID" ]; then
            echo "El start_id no puede ser mayor al end_id"
            exit 1
          fi

          echo "username,status,warning" > "$LOG_FILE"

          jq -c --argjson start "$START_ID" --argjson end "$END_ID" '
            map(select(
              (.id != null) and
              ((.id | tonumber) >= $start) and
              ((.id | tonumber) <= $end)
            ))[]
          ' data/creators.json | while read -r creator; do
            ID=$(echo "$creator" | jq -r '.id // empty')
            USERNAME=$(echo "$creator" | jq -r '.username // empty')
            DISPLAYNAME=$(echo "$creator" | jq -r '.username // empty')

            if [ -z "$ID" ]; then
              echo "\"\",\"skipped\",\"missing id\"" >> "$LOG_FILE"
              continue
            fi

            if [ -z "$USERNAME" ]; then
              echo "\"\",\"skipped\",\"missing username for id $ID\"" >> "$LOG_FILE"
              continue
            fi

            TARGET_DIR="u/$USERNAME"
            TARGET_FILE="$TARGET_DIR/index.html"

            mkdir -p "$TARGET_DIR"

            if ! cp "u/profile-template.html" "$TARGET_FILE"; then
              echo "\"$USERNAME\",\"error\",\"could not copy template\"" >> "$LOG_FILE"
              continue
            fi

            if ! sed -i "s|PH-STREAMER-USERNAME|$USERNAME|g" "$TARGET_FILE"; then
              echo "\"$USERNAME\",\"error\",\"failed replacing PH-STREAMER-USERNAME\"" >> "$LOG_FILE"
              continue
            fi

            if ! sed -i "s|PH-STREAMER-DISPLAYNAME|$DISPLAYNAME|g" "$TARGET_FILE"; then
              echo "\"$USERNAME\",\"error\",\"failed replacing PH-STREAMER-DISPLAYNAME\"" >> "$LOG_FILE"
              continue
            fi

            AVATAR=$(echo "$creator" | jq -r '.avatar // .profilePhoto // .profile_photo // ""')
            BIO_SHORT=$(echo "$creator" | jq -r '.bioShort // .bio_short // .bio // ""')
            CATEGORY=$(echo "$creator" | jq -r '.category // .gameCategory // .contentType // ""')

            TWITCH=$(echo "$creator" | jq -r '.twitch // empty')
            KICK=$(echo "$creator" | jq -r '.kick // empty')
            IG=$(echo "$creator" | jq -r '.ig // empty')
            XLINK=$(echo "$creator" | jq -r '.x // empty')
            YOUTUBE=$(echo "$creator" | jq -r '.youtube // empty')
            TIKTOK=$(echo "$creator" | jq -r '.tiktok // empty')
            EMAIL=$(echo "$creator" | jq -r '.email // empty')

            esc() {
              printf '%s' "$1" | sed 's/[&/\]/\\&/g'
            }

            [ -z "$AVATAR" ] && AVATAR="PH-LINKPENDING"
            [ -z "$BIO_SHORT" ] && BIO_SHORT=""
            [ -z "$CATEGORY" ] && CATEGORY="Creator"
            [ -z "$TWITCH" ] && TWITCH="PH-LINKPENDING"
            [ -z "$KICK" ] && KICK="PH-LINKPENDING"
            [ -z "$IG" ] && IG="PH-LINKPENDING"
            [ -z "$XLINK" ] && XLINK="PH-LINKPENDING"
            [ -z "$YOUTUBE" ] && YOUTUBE="PH-LINKPENDING"
            [ -z "$TIKTOK" ] && TIKTOK="PH-LINKPENDING"
            [ -z "$EMAIL" ] && EMAIL="PH-LINKPENDING"

            if [ "$TWITCH" != "PH-LINKPENDING" ]; then
              TWITCH_URL="https://twitch.tv/$TWITCH"
            else
              TWITCH_URL="PH-LINKPENDING"
            fi

            if [ "$KICK" != "PH-LINKPENDING" ]; then
              KICK_URL="https://kick.com/$KICK"
            else
              KICK_URL="PH-LINKPENDING"
            fi

            if [ "$IG" != "PH-LINKPENDING" ]; then
              IG_URL="https://instagram.com/$IG"
            else
              IG_URL="PH-LINKPENDING"
            fi

            if [ "$XLINK" != "PH-LINKPENDING" ]; then
              X_URL="https://x.com/$XLINK"
            else
              X_URL="PH-LINKPENDING"
            fi

            if [ "$YOUTUBE" != "PH-LINKPENDING" ]; then
              YOUTUBE_URL="https://youtube.com/$YOUTUBE"
            else
              YOUTUBE_URL="PH-LINKPENDING"
            fi

            if [ "$TIKTOK" != "PH-LINKPENDING" ]; then
              TIKTOK_URL="https://tiktok.com/@$TIKTOK"
            else
              TIKTOK_URL="PH-LINKPENDING"
            fi

            sed -i "s|PH-STREAMER-AVATAR|$(esc "$AVATAR")|g" "$TARGET_FILE"
            sed -i "s|PH-STREAMER-BIO-SHORT|$(esc "$BIO_SHORT")|g" "$TARGET_FILE"
            sed -i "s|PH-STREAMER-CATEGORY|$(esc "$CATEGORY")|g" "$TARGET_FILE"

            sed -i "s|PH-STREAMER-TWITCH|$(esc "$TWITCH")|g" "$TARGET_FILE"
            sed -i "s|PH-STREAMER-KICK|$(esc "$KICK")|g" "$TARGET_FILE"
            sed -i "s|PH-STREAMER-IG|$(esc "$IG")|g" "$TARGET_FILE"
            sed -i "s|PH-STREAMER-X|$(esc "$XLINK")|g" "$TARGET_FILE"
            sed -i "s|PH-STREAMER-YOUTUBE|$(esc "$YOUTUBE")|g" "$TARGET_FILE"
            sed -i "s|PH-STREAMER-TIKTOK|$(esc "$TIKTOK")|g" "$TARGET_FILE"
            sed -i "s|PH-STREAMER-EMAIL|$(esc "$EMAIL")|g" "$TARGET_FILE"

            sed -i "s|PH-LINK-TWITCH|$(esc "$TWITCH_URL")|g" "$TARGET_FILE"
            sed -i "s|PH-LINK-KICK|$(esc "$KICK_URL")|g" "$TARGET_FILE"
            sed -i "s|PH-LINK-INSTAGRAM|$(esc "$IG_URL")|g" "$TARGET_FILE"
            sed -i "s|PH-LINK-X|$(esc "$X_URL")|g" "$TARGET_FILE"
            sed -i "s|PH-LINK-YOUTUBE|$(esc "$YOUTUBE_URL")|g" "$TARGET_FILE"
            sed -i "s|PH-LINK-TIKTOK|$(esc "$TIKTOK_URL")|g" "$TARGET_FILE"

            python3 - "$TARGET_FILE" <<'PY'
import re
import sys
from pathlib import Path

path = Path(sys.argv[1])
html = path.read_text(encoding="utf-8")

html = re.sub(
    r'<a\b[^>]*href="(?:mailto:)?PH-LINKPENDING"[^>]*>.*?</a>',
    '',
    html,
    flags=re.DOTALL
)

path.write_text(html, encoding="utf-8")
PY

            if grep -q "$USERNAME" "$TARGET_FILE"; then
              echo "\"$USERNAME\",\"generated\",\"ok\"" >> "$LOG_FILE"
            else
              echo "\"$USERNAME\",\"warning\",\"file created but username not found in output\"" >> "$LOG_FILE"
            fi
          done

      - name: Mostrar log generado
        run: |
          echo "=== profile-generation-log.csv ==="
          cat profile-generation-log.csv

      - name: Mostrar carpetas generadas
        run: |
          echo "=== Árbol de u/ ==="
          ls -R u || true

      - name: Subir artifact de perfiles
        uses: actions/upload-artifact@v6
        with:
          name: generated-profiles-range-${{ github.event.inputs.start_id }}-${{ github.event.inputs.end_id }}
          path: |
            u/
            profile-generation-log.csv
          if-no-files-found: error
          overwrite: true