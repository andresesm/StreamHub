name: Range linkshub profiles by ID range

on:
  workflow_dispatch:
    inputs:
      start_id:
        description: "ID inicial"
        required: true
        default: "1"
      end_id:
        description: "ID final"
        required: true
        default: "50"

jobs:
  generate-profiles-by-range:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verificar archivos base
        run: |
          test -f "u/profile-template.html"
          test -f "data/creators.json"

      - name: Generar perfiles por rango y crear log
        shell: bash
        run: |
          START_ID="${{ github.event.inputs.start_id }}"
          END_ID="${{ github.event.inputs.end_id }}"
          LOG_FILE="profile-generation-log.csv"

          if ! [[ "$START_ID" =~ ^[0-9]+$ ]]; then
            echo "start_id inválido: $START_ID"
            exit 1
          fi

          if ! [[ "$END_ID" =~ ^[0-9]+$ ]]; then
            echo "end_id inválido: $END_ID"
            exit 1
          fi

          if [ "$START_ID" -gt "$END_ID" ]; then
            echo "El start_id no puede ser mayor al end_id"
            exit 1
          fi

          trim() {
            local s="$1"
            s="${s//$'\r'/}"
            s="${s//$'\n'/ }"
            s="$(printf '%s' "$s" | sed 's/[[:space:]]\+/ /g; s/^ *//; s/ *$//')"
            printf '%s' "$s"
          }

          escape_sed() {
            printf '%s' "$1" | sed -e 's/[\/&]/\\&/g'
          }

          make_url_from_handle() {
            local raw base
            raw="$(trim "$1")"
            base="$2"

            if [ -z "$raw" ] || [ "$raw" = "null" ]; then
              printf 'PH-LINKPENDING'
              return
            fi

            if [[ "$raw" =~ ^https?:// ]]; then
              printf '%s' "$raw"
              return
            fi

            raw="${raw#@}"
            printf '%s%s' "$base" "$raw"
          }

          make_tiktok_url() {
            local raw
            raw="$(trim "$1")"

            if [ -z "$raw" ] || [ "$raw" = "null" ]; then
              printf 'PH-LINKPENDING'
              return
            fi

            if [[ "$raw" =~ ^https?:// ]]; then
              printf '%s' "$raw"
              return
            fi

            raw="${raw#@}"
            printf 'https://www.tiktok.com/@%s' "$raw"
          }

          make_youtube_url() {
            local raw
            raw="$(trim "$1")"

            if [ -z "$raw" ] || [ "$raw" = "null" ]; then
              printf 'PH-LINKPENDING'
              return
            fi

            if [[ "$raw" =~ ^https?:// ]]; then
              printf '%s' "$raw"
              return
            fi

            raw="${raw#@}"

            if [[ "$raw" =~ ^UC[[:alnum:]_-]+$ ]]; then
              printf 'https://www.youtube.com/channel/%s' "$raw"
            else
              printf 'https://www.youtube.com/@%s' "$raw"
            fi
          }

          make_display_handle() {
            local raw
            raw="$(trim "$1")"

            if [ -z "$raw" ] || [ "$raw" = "null" ]; then
              printf 'PH-LINKPENDING'
              return
            fi

            if [[ "$raw" =~ ^https?:// ]]; then
              raw="${raw%/}"
              raw="${raw##*/}"
            fi

            raw="${raw#@}"

            if [ -z "$raw" ]; then
              printf 'PH-LINKPENDING'
            else
              printf '@%s' "$raw"
            fi
          }

          make_email_value() {
            local raw
            raw="$(trim "$1")"

            if [ -z "$raw" ] || [ "$raw" = "null" ]; then
              printf 'PH-LINKPENDING'
            else
              printf '%s' "$raw"
            fi
          }

          echo "username,status,warning" > "$LOG_FILE"

          jq -c --argjson start "$START_ID" --argjson end "$END_ID" '
            map(select(
              (.id != null) and
              ((.id | tonumber) >= $start) and
              ((.id | tonumber) <= $end)
            ))[]
          ' data/creators.json | while read -r creator; do
            ID=$(echo "$creator" | jq -r '.id // empty')
            USERNAME=$(echo "$creator" | jq -r '.username // empty')
            DISPLAYNAME=$(echo "$creator" | jq -r '.username // empty')

            if [ -z "$ID" ]; then
              echo "\"\",\"skipped\",\"missing id\"" >> "$LOG_FILE"
              continue
            fi

            if [ -z "$USERNAME" ]; then
              echo "\"\",\"skipped\",\"missing username for id $ID\"" >> "$LOG_FILE"
              continue
            fi

            TARGET_DIR="u/$USERNAME"
            TARGET_FILE="$TARGET_DIR/index.html"

            mkdir -p "$TARGET_DIR"

            if ! cp "u/profile-template.html" "$TARGET_FILE"; then
              echo "\"$USERNAME\",\"error\",\"could not copy template\"" >> "$LOG_FILE"
              continue
            fi

            if ! sed -i "s|PH-STREAMER-USERNAME|$USERNAME|g" "$TARGET_FILE"; then
              echo "\"$USERNAME\",\"error\",\"failed replacing PH-STREAMER-USERNAME\"" >> "$LOG_FILE"
              continue
            fi

            if ! sed -i "s|PH-STREAMER-DISPLAYNAME|$DISPLAYNAME|g" "$TARGET_FILE"; then
              echo "\"$USERNAME\",\"error\",\"failed replacing PH-STREAMER-DISPLAYNAME\"" >> "$LOG_FILE"
              continue
            fi

            DESCRIPTION_RAW=$(echo "$creator" | jq -r '.description // .bio // .about // .summary // ""')
            DESCRIPTION="$(trim "$DESCRIPTION_RAW")"
            if [ -z "$DESCRIPTION" ]; then
              DESCRIPTION="Perfil oficial de $DISPLAYNAME en StreamHUB."
            fi

            BIO_SHORT="$DESCRIPTION"
            if [ "${#BIO_SHORT}" -gt 150 ]; then
              BIO_SHORT="${BIO_SHORT:0:147}..."
            fi

            CATEGORY_RAW=$(echo "$creator" | jq -r '.category // .contentType // .type // "Creator"')
            CATEGORY="$(trim "$CATEGORY_RAW")"
            if [ -z "$CATEGORY" ]; then
              CATEGORY="Creator"
            fi

            AVATAR_RAW=$(echo "$creator" | jq -r '.avatar // .profilePicture // .profile_picture // .image // .photo // ""')
            AVATAR="$(trim "$AVATAR_RAW")"
            if [ -z "$AVATAR" ]; then
              AVATAR="../../favicon.ico"
            fi

            TITLE="$DISPLAYNAME | StreamHUB"
            PROFILE_PATH="/u/$USERNAME/"
            DATAKEY="$ID"

            TWITCH_RAW=$(echo "$creator" | jq -r '.twitch // .socials.twitch // ""')
            KICK_RAW=$(echo "$creator" | jq -r '.kick // .socials.kick // ""')
            IG_RAW=$(echo "$creator" | jq -r '.ig // .instagram // .socials.ig // .socials.instagram // ""')
            X_RAW=$(echo "$creator" | jq -r '.x // .twitter // .socials.x // .socials.twitter // ""')
            YOUTUBE_RAW=$(echo "$creator" | jq -r '.youtube // .socials.youtube // ""')
            TIKTOK_RAW=$(echo "$creator" | jq -r '.tiktok // .socials.tiktok // ""')
            EMAIL_RAW=$(echo "$creator" | jq -r '.email // .socials.email // ""')

            LINK_TWITCH="$(make_url_from_handle "$TWITCH_RAW" "https://www.twitch.tv/")"
            LINK_KICK="$(make_url_from_handle "$KICK_RAW" "https://kick.com/")"
            LINK_INSTAGRAM="$(make_url_from_handle "$IG_RAW" "https://www.instagram.com/")"
            LINK_X="$(make_url_from_handle "$X_RAW" "https://x.com/")"
            LINK_YOUTUBE="$(make_youtube_url "$YOUTUBE_RAW")"
            LINK_TIKTOK="$(make_tiktok_url "$TIKTOK_RAW")"
            EMAIL_VALUE="$(make_email_value "$EMAIL_RAW")"

            DISPLAY_TWITCH="$(make_display_handle "$TWITCH_RAW")"
            DISPLAY_KICK="$(make_display_handle "$KICK_RAW")"
            DISPLAY_IG="$(make_display_handle "$IG_RAW")"
            DISPLAY_X="$(make_display_handle "$X_RAW")"
            DISPLAY_YOUTUBE="$(make_display_handle "$YOUTUBE_RAW")"
            DISPLAY_TIKTOK="$(make_display_handle "$TIKTOK_RAW")"

            sed -i "s|PH-STREAMER-TITLE|$(escape_sed "$TITLE")|g" "$TARGET_FILE"
            sed -i "s|PH-STREAMER-DESCRIPTION|$(escape_sed "$DESCRIPTION")|g" "$TARGET_FILE"
            sed -i "s|PH-STREAMER-BIO-SHORT|$(escape_sed "$BIO_SHORT")|g" "$TARGET_FILE"
            sed -i "s|PH-STREAMER-CATEGORY|$(escape_sed "$CATEGORY")|g" "$TARGET_FILE"
            sed -i "s|PH-STREAMER-AVATAR|$(escape_sed "$AVATAR")|g" "$TARGET_FILE"
            sed -i "s|PH-STREAMER-CANONICAL|$(escape_sed "$PROFILE_PATH")|g" "$TARGET_FILE"
            sed -i "s|PH-STREAMER-OG-URL|$(escape_sed "$PROFILE_PATH")|g" "$TARGET_FILE"
            sed -i "s|PH-STREAMER-DATAKEY|$(escape_sed "$DATAKEY")|g" "$TARGET_FILE"
            sed -i "s|PH-STREAMER-NAME|$(escape_sed "$DISPLAYNAME")|g" "$TARGET_FILE"

            sed -i "s|PH-LINK-TWITCH|$(escape_sed "$LINK_TWITCH")|g" "$TARGET_FILE"
            sed -i "s|PH-LINK-KICK|$(escape_sed "$LINK_KICK")|g" "$TARGET_FILE"
            sed -i "s|PH-LINK-INSTAGRAM|$(escape_sed "$LINK_INSTAGRAM")|g" "$TARGET_FILE"
            sed -i "s|PH-LINK-X|$(escape_sed "$LINK_X")|g" "$TARGET_FILE"
            sed -i "s|PH-LINK-YOUTUBE|$(escape_sed "$LINK_YOUTUBE")|g" "$TARGET_FILE"
            sed -i "s|PH-LINK-TIKTOK|$(escape_sed "$LINK_TIKTOK")|g" "$TARGET_FILE"

            sed -i "s|PH-STREAMER-TWITCH|$(escape_sed "$DISPLAY_TWITCH")|g" "$TARGET_FILE"
            sed -i "s|PH-STREAMER-KICK|$(escape_sed "$DISPLAY_KICK")|g" "$TARGET_FILE"
            sed -i "s|PH-STREAMER-IG|$(escape_sed "$DISPLAY_IG")|g" "$TARGET_FILE"
            sed -i "s|PH-STREAMER-X|$(escape_sed "$DISPLAY_X")|g" "$TARGET_FILE"
            sed -i "s|PH-STREAMER-YOUTUBE|$(escape_sed "$DISPLAY_YOUTUBE")|g" "$TARGET_FILE"
            sed -i "s|PH-STREAMER-TIKTOK|$(escape_sed "$DISPLAY_TIKTOK")|g" "$TARGET_FILE"

            sed -i "s|PH-STREAMER-EMAIL|$(escape_sed "$EMAIL_VALUE")|g" "$TARGET_FILE"

            python3 - "$TARGET_FILE" <<'PY'
import re
import sys
from pathlib import Path

path = Path(sys.argv[1])
html = path.read_text(encoding="utf-8")

html = re.sub(
    r'\s*<a\b[^>]*href="PH-LINKPENDING"[^>]*>.*?</a>',
    '',
    html,
    flags=re.S
)

html = re.sub(
    r'\s*<a\b[^>]*href="mailto:PH-LINKPENDING"[^>]*>.*?</a>',
    '',
    html,
    flags=re.S
)

path.write_text(html, encoding="utf-8")
PY

            if grep -q "$USERNAME" "$TARGET_FILE"; then
              echo "\"$USERNAME\",\"generated\",\"ok\"" >> "$LOG_FILE"
            else
              echo "\"$USERNAME\",\"warning\",\"file created but username not found in output\"" >> "$LOG_FILE"
            fi
          done

      - name: Mostrar log generado
        run: |
          echo "=== profile-generation-log.csv ==="
          cat profile-generation-log.csv

      - name: Mostrar carpetas generadas
        run: |
          echo "=== Árbol de u/ ==="
          ls -R u || true

      - name: Subir artifact de perfiles
        uses: actions/upload-artifact@v6
        with:
          name: generated-profiles-range-${{ github.event.inputs.start_id }}-${{ github.event.inputs.end_id }}
          path: |
            u/
            profile-generation-log.csv
          if-no-files-found: error
          overwrite: true