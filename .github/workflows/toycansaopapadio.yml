name: toycansaopapadiov2
on:
  workflow_dispatch:
    inputs:
      start_id:
        description: "ID inicial"
        required: true
        default: "1"
      end_id:
        description: "ID final"
        required: true
        default: "50"

jobs:
  generate-profiles-by-range:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verificar archivos base
        run: |
          test -f "u/profile-template.html"
          test -f "data/creators.json"

      - name: Generar perfiles por rango y crear log
        shell: bash
        run: |
          START_ID="${{ github.event.inputs.start_id }}"
          END_ID="${{ github.event.inputs.end_id }}"
          LOG_FILE="profile-generation-log.csv"
          EXPORT_ROOT="generated-range-output"

          if ! [[ "$START_ID" =~ ^[0-9]+$ ]]; then
            echo "start_id inválido: $START_ID"
            exit 1
          fi

          if ! [[ "$END_ID" =~ ^[0-9]+$ ]]; then
            echo "end_id inválido: $END_ID"
            exit 1
          fi

          if [ "$START_ID" -gt "$END_ID" ]; then
            echo "El start_id no puede ser mayor al end_id"
            exit 1
          fi

          rm -rf "$EXPORT_ROOT"
          mkdir -p "$EXPORT_ROOT/u"

          echo "username,status,warning" > "$LOG_FILE"

          jq -c --argjson start "$START_ID" --argjson end "$END_ID" '
            map(select(
              (.id != null) and
              ((.id | tonumber) >= $start) and
              ((.id | tonumber) <= $end)
            ))[]
          ' data/creators.json | while read -r creator; do
            ID=$(echo "$creator" | jq -r '.id // empty')
            USERNAME=$(echo "$creator" | jq -r '.username // empty')
            DISPLAYNAME=$(echo "$creator" | jq -r '.displayname // .displayName // .username // empty')
            DATAKEY=$(echo "$creator" | jq -r '.dataKey // .datakey // .slug // .username // .id // empty')
            TITLE=$(echo "$creator" | jq -r '.title // .displayname // .displayName // .username // empty')
            DESCRIPTION=$(echo "$creator" | jq -r '.description // .bioShort // .shortBio // .bio // ""')

            if [ -z "$ID" ]; then
              echo "\"\",\"skipped\",\"missing id\"" >> "$LOG_FILE"
              continue
            fi

            if [ -z "$USERNAME" ]; then
              echo "\"\",\"skipped\",\"missing username for id $ID\"" >> "$LOG_FILE"
              continue
            fi

            TARGET_DIR="$EXPORT_ROOT/u/$USERNAME"
            TARGET_FILE="$TARGET_DIR/index.html"

            mkdir -p "$TARGET_DIR"

            if ! cp "u/profile-template.html" "$TARGET_FILE"; then
              echo "\"$USERNAME\",\"error\",\"could not copy template\"" >> "$LOG_FILE"
              continue
            fi

            AVATAR=$(echo "$creator" | jq -r '.avatar_url // .avatar // .profilePhoto // .photo // ""')
            BIO_SHORT=$(echo "$creator" | jq -r '.bioShort // .shortBio // .bio // ""')
            CATEGORY=$(echo "$creator" | jq -r '.category // .contentCategory // ""')

            TWITCH=$(echo "$creator" | jq -r '.socials.twitch // .twitch // ""')
            KICK=$(echo "$creator" | jq -r '.socials.kick // .kick // ""')
            IG=$(echo "$creator" | jq -r '.socials.ig // .ig // .instagram // ""')
            X=$(echo "$creator" | jq -r '.socials.x // .x // ""')
            YOUTUBE=$(echo "$creator" | jq -r '.socials.youtube // .youtube // ""')
            TIKTOK=$(echo "$creator" | jq -r '.socials.tiktok // .tiktok // ""')
            EMAIL=$(echo "$creator" | jq -r '.socials.email // .email // ""')

            [ -z "$AVATAR" ] && AVATAR="PH-STREAMER-AVATAR"
            [ -z "$BIO_SHORT" ] && BIO_SHORT=""
            [ -z "$CATEGORY" ] && CATEGORY="Creator"
            [ -z "$DISPLAYNAME" ] && DISPLAYNAME="$USERNAME"
            [ -z "$TITLE" ] && TITLE="$DISPLAYNAME"
            [ -z "$DATAKEY" ] && DATAKEY="$USERNAME"

            CANONICAL="../../u/$USERNAME/"
            OG_URL="../../u/$USERNAME/"

            if [ -n "$TWITCH" ] && [ "$TWITCH" != "null" ]; then
              PH_LINK_TWITCH="https://www.twitch.tv/${TWITCH#@}"
              PH_TEXT_TWITCH="@${TWITCH#@}"
            else
              PH_LINK_TWITCH=""
              PH_TEXT_TWITCH=""
            fi

            if [ -n "$KICK" ] && [ "$KICK" != "null" ]; then
              PH_LINK_KICK="https://kick.com/${KICK#@}"
              PH_TEXT_KICK="@${KICK#@}"
            else
              PH_LINK_KICK=""
              PH_TEXT_KICK=""
            fi

            if [ -n "$IG" ] && [ "$IG" != "null" ]; then
              PH_LINK_IG="https://www.instagram.com/${IG#@}"
              PH_TEXT_IG="@${IG#@}"
            else
              PH_LINK_IG=""
              PH_TEXT_IG=""
            fi

            if [ -n "$X" ] && [ "$X" != "null" ]; then
              PH_LINK_X="https://x.com/${X#@}"
              PH_TEXT_X="@${X#@}"
            else
              PH_LINK_X=""
              PH_TEXT_X=""
            fi

            if [ -n "$YOUTUBE" ] && [ "$YOUTUBE" != "null" ]; then
              if [[ "$YOUTUBE" =~ ^https?:// ]] || [[ "$YOUTUBE" =~ ^// ]]; then
                PH_LINK_YOUTUBE="$YOUTUBE"
                PH_TEXT_YOUTUBE="$YOUTUBE"
              else
                PH_LINK_YOUTUBE="https://www.youtube.com/@${YOUTUBE#@}"
                PH_TEXT_YOUTUBE="@${YOUTUBE#@}"
              fi
            else
              PH_LINK_YOUTUBE=""
              PH_TEXT_YOUTUBE=""
            fi

            if [ -n "$TIKTOK" ] && [ "$TIKTOK" != "null" ]; then
              PH_LINK_TIKTOK="https://www.tiktok.com/@${TIKTOK#@}"
              PH_TEXT_TIKTOK="@${TIKTOK#@}"
            else
              PH_LINK_TIKTOK=""
              PH_TEXT_TIKTOK=""
            fi

            if [ -n "$EMAIL" ] && [ "$EMAIL" != "null" ]; then
              PH_LINK_EMAIL="mailto:$EMAIL"
              PH_TEXT_EMAIL="$EMAIL"
            else
              PH_LINK_EMAIL=""
              PH_TEXT_EMAIL=""
            fi

            export TARGET_FILE USERNAME DISPLAYNAME DATAKEY TITLE DESCRIPTION AVATAR BIO_SHORT CATEGORY
            export CANONICAL OG_URL
            export PH_LINK_TWITCH PH_LINK_KICK PH_LINK_IG PH_LINK_X PH_LINK_YOUTUBE PH_LINK_TIKTOK PH_LINK_EMAIL
            export PH_TEXT_TWITCH PH_TEXT_KICK PH_TEXT_IG PH_TEXT_X PH_TEXT_YOUTUBE PH_TEXT_TIKTOK PH_TEXT_EMAIL

            python3 -c '
import os
from pathlib import Path

path = Path(os.environ["TARGET_FILE"])
html = path.read_text(encoding="utf-8")

replacements = {
    "PH-STREAMER-USERNAME": os.environ["USERNAME"],
    "PH-STREAMER-DISPLAYNAME": os.environ["DISPLAYNAME"],
    "PH-STREAMER-NAME": os.environ["DISPLAYNAME"],
    "PH-STREAMER-DATAKEY": os.environ["DATAKEY"],
    "PH-STREAMER-TITLE": os.environ["TITLE"],
    "PH-STREAMER-DESCRIPTION": os.environ["DESCRIPTION"],
    "PH-STREAMER-CANONICAL": os.environ["CANONICAL"],
    "PH-STREAMER-OG-URL": os.environ["OG_URL"],
    "PH-STREAMER-AVATAR": os.environ["AVATAR"],
    "PH-STREAMER-BIO-SHORT": os.environ["BIO_SHORT"],
    "PH-STREAMER-CATEGORY": os.environ["CATEGORY"],
}

for k, v in replacements.items():
    html = html.replace(k, v)

def valid(value: str) -> bool:
    value = (value or "").strip()
    return value != "" and value != "null" and value != "PH-LINKPENDING"

buttons = []

if valid(os.environ["PH_LINK_TWITCH"]) and valid(os.environ["PH_TEXT_TWITCH"]):
    buttons.append(f"""            <a class="link-btn link-btn--twitch" href="{os.environ["PH_LINK_TWITCH"]}" target="_blank" rel="noopener noreferrer">
              <span class="link-icon brand-twitch" aria-hidden="true"></span>
              <span class="link-copy">
                <strong>Twitch</strong>
                <small>{os.environ["PH_TEXT_TWITCH"]}</small>
              </span>
            </a>""")

if valid(os.environ["PH_LINK_KICK"]) and valid(os.environ["PH_TEXT_KICK"]):
    buttons.append(f"""            <a class="link-btn link-btn--kick" href="{os.environ["PH_LINK_KICK"]}" target="_blank" rel="noopener noreferrer">
              <span class="link-icon brand-kick" aria-hidden="true"></span>
              <span class="link-copy">
                <strong>Kick</strong>
                <small>{os.environ["PH_TEXT_KICK"]}</small>
              </span>
            </a>""")

if valid(os.environ["PH_LINK_YOUTUBE"]) and valid(os.environ["PH_TEXT_YOUTUBE"]):
    buttons.append(f"""            <a class="link-btn link-btn--youtube" href="{os.environ["PH_LINK_YOUTUBE"]}" target="_blank" rel="noopener noreferrer">
              <span class="link-icon brand-youtube" aria-hidden="true"></span>
              <span class="link-copy">
                <strong>YouTube</strong>
                <small>{os.environ["PH_TEXT_YOUTUBE"]}</small>
              </span>
            </a>""")

if valid(os.environ["PH_LINK_TIKTOK"]) and valid(os.environ["PH_TEXT_TIKTOK"]):
    buttons.append(f"""            <a class="link-btn link-btn--tiktok" href="{os.environ["PH_LINK_TIKTOK"]}" target="_blank" rel="noopener noreferrer">
              <span class="link-icon brand-tiktok" aria-hidden="true"></span>
              <span class="link-copy">
                <strong>TikTok</strong>
                <small>{os.environ["PH_TEXT_TIKTOK"]}</small>
              </span>
            </a>""")

if valid(os.environ["PH_LINK_IG"]) and valid(os.environ["PH_TEXT_IG"]):
    buttons.append(f"""            <a class="link-btn link-btn--instagram" href="{os.environ["PH_LINK_IG"]}" target="_blank" rel="noopener noreferrer">
              <span class="link-icon brand-instagram" aria-hidden="true"></span>
              <span class="link-copy">
                <strong>Instagram</strong>
                <small>{os.environ["PH_TEXT_IG"]}</small>
              </span>
            </a>""")

if valid(os.environ["PH_LINK_X"]) and valid(os.environ["PH_TEXT_X"]):
    buttons.append(f"""            <a class="link-btn link-btn--x" href="{os.environ["PH_LINK_X"]}" target="_blank" rel="noopener noreferrer">
              <span class="link-icon brand-x" aria-hidden="true"></span>
              <span class="link-copy">
                <strong>X</strong>
                <small>{os.environ["PH_TEXT_X"]}</small>
              </span>
            </a>""")

if valid(os.environ["PH_LINK_EMAIL"]) and valid(os.environ["PH_TEXT_EMAIL"]):
    buttons.append(f"""            <a class="link-btn link-btn--email" href="{os.environ["PH_LINK_EMAIL"]}">
              <span class="link-icon brand-email" aria-hidden="true"></span>
              <span class="link-copy">
                <strong>Email</strong>
                <small>{os.environ["PH_TEXT_EMAIL"]}</small>
              </span>
            </a>""")

social_buttons_html = "\n\n".join(buttons)
html = html.replace("PH-SOCIAL-BUTTONS", social_buttons_html)

path.write_text(html, encoding="utf-8")
'

            if grep -q "$USERNAME" "$TARGET_FILE"; then
              echo "\"$USERNAME\",\"generated\",\"ok\"" >> "$LOG_FILE"
            else
              echo "\"$USERNAME\",\"warning\",\"file created but username not found in output\"" >> "$LOG_FILE"
            fi
          done

      - name: Mostrar log generado
        run: |
          echo "=== profile-generation-log.csv ==="
          cat profile-generation-log.csv

      - name: Mostrar carpetas generadas
        run: |
          echo "=== Árbol de generated-range-output/u/ ==="
          ls -R generated-range-output/u || true

      - name: Subir artifact de perfiles
        uses: actions/upload-artifact@v4
        with:
          name: generated-profiles-range-${{ github.event.inputs.start_id }}-${{ github.event.inputs.end_id }}
          path: |
            generated-range-output/u/
            profile-generation-log.csv
          if-no-files-found: error
          overwrite: true